name: fuel_cred
description: "FuelPay - Premium fuel payment and rewards ecosystem. Pay, track, and earn FuelCredits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10

  # State Management
  riverpod: ^2.4.11
  flutter_riverpod: ^2.4.11
  riverpod_generator: ^2.3.14

  # Routing
  go_router: ^13.1.1

  # Networking
  dio: ^5.3.1
  connectivity_plus: ^5.0.2

  # Local Storage & Serialization
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

  # Security & Storage
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Payment Integration
  razorpay_flutter: ^1.3.8

  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.4
  qr_code_scanner: ^1.0.1

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.6.11

  # Animations
  lottie: ^2.7.0
  animate_do: ^3.1.2

  # UI Components
  intl: ^0.19.0
  logger: ^2.1.0
  toasty_box: ^1.0.6

  # Device Info
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1

  # QR & Barcode
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.0.0
  equatable: ^2.0.5
  url_launcher: ^6.2.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env

# The following section is specific to Flutter packages.
