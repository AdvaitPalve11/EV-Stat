name: fuel_cred
description: "FuelPay - Premium fuel payment and rewards ecosystem. Pay, track, and earn FuelCredits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.6.11

  # Animations
  lottie: ^2.7.0
  animate_do: ^3.1.2

  # UI Components
  intl: ^0.19.0
  logger: ^2.1.0
  toasty_box: ^1.0.6

  # Device Info
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1

  # QR & Barcode
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.0.0
  equatable: ^2.0.5
  url_launcher: ^6.2.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
