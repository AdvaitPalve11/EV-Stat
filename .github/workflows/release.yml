name: Flutter Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark this as a pre-release"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Android Release Assets
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Build Android App Bundle (release)
        run: flutter build appbundle --release

      - name: Prepare release artifacts
        run: |
          mkdir -p release-assets
          cp build/app/outputs/flutter-apk/app-release.apk release-assets/
          cp build/app/outputs/bundle/release/app-release.aab release-assets/
          cd release-assets
          sha256sum app-release.apk app-release.aab > checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets-${{ env.RELEASE_TAG }}
          path: release-assets/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: FuelPay ${{ env.RELEASE_TAG }}
          prerelease: ${{ inputs.prerelease || false }}
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: |
            release-assets/app-release.apk
            release-assets/app-release.aab
            release-assets/checksums.txt
